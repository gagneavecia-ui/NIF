<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vendre - N.I.F</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0A1128">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #D4AF37;
      --primary-dark: #AA8417;
      --primary-light: #F3E5AB;
      --bg-dark: #0A1128;
      --bg-surface: #111A36;
      --text-light: #FFFFFF;
      --text-dim: #94A3B8;
      --card-bg: rgba(17, 26, 54, 0.65);
      --card-border: rgba(212, 175, 55, 0.12);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --glass-bg: rgba(212, 175, 55, 0.03);
      --glass-border: rgba(212, 175, 55, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 15%, rgba(212, 175, 55, 0.06) 0%, transparent 70%),
                  linear-gradient(180deg, #0A1128 0%, #070C1E 100%);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 17, 40, 0.95);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: 20px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }

    .logo span { color: var(--primary); }

    .back-btn {
      width: 36px;
      height: 36px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-btn:hover { border-color: var(--primary); }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ===== HEADER PAGE ===== */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header .subtitle {
      font-size: 10px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      margin-top: 4px;
    }

    .page-header h1 span { color: var(--primary); font-style: italic; }

    .page-header p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 6px;
    }

    /* ===== FORMULAIRE ===== */
    .vendre-form {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
    }

    .vendre-form .form-group {
      margin-bottom: 18px;
    }

    .vendre-form label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .vendre-form input,
    .vendre-form select,
    .vendre-form textarea {
      width: 100%;
      padding: 12px 14px;
      background: rgba(10, 17, 40, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      color: var(--text-light);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
      outline: none;
    }

    .vendre-form input:focus,
    .vendre-form select:focus,
    .vendre-form textarea:focus {
      border-color: var(--primary);
      background: rgba(10, 17, 40, 0.9);
    }

    .vendre-form textarea {
      min-height: 80px;
      resize: vertical;
    }

    .vendre-form select option {
      background: var(--bg-dark);
      color: var(--text-light);
    }

    .vendre-form .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ===== IMAGE UPLOAD ===== */
    .image-upload-section {
      margin-bottom: 18px;
    }

    .image-upload-section .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .image-upload-section .label-row label {
      margin-bottom: 0;
    }

    .image-upload-section .input-methods {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .image-upload-section .method-btn {
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .image-upload-section .method-btn.active {
      background: var(--primary);
      color: #0A1128;
      border-color: var(--primary);
    }

    .image-upload-section .method-btn:active {
      transform: scale(0.95);
    }

    .image-preview-container {
      position: relative;
      width: 100%;
      height: 160px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(10, 17, 40, 0.6);
      border: 2px dashed rgba(212, 175, 55, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      cursor: pointer;
    }

    .image-preview-container.dragover {
      border-color: var(--primary);
      background: rgba(212, 175, 55, 0.05);
    }

    .image-preview-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview-container .placeholder {
      text-align: center;
      color: var(--text-dim);
    }

    .image-preview-container .placeholder i {
      font-size: 32px;
      opacity: 0.3;
      margin-bottom: 8px;
      display: block;
    }

    .image-preview-container .placeholder p {
      font-size: 12px;
    }

    .image-preview-container .remove-image {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(239, 68, 68, 0.9);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      font-size: 12px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .image-preview-container .remove-image.show {
      display: flex;
    }

    .image-preview-container .upload-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s;
      border-radius: 0 0 12px 12px;
    }

    .image-url-input {
      display: none;
      margin-top: 10px;
    }

    .image-url-input.visible {
      display: block;
    }

    .image-url-input input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(10, 17, 40, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 10px;
      color: var(--text-light);
      font-size: 13px;
      outline: none;
    }

    .image-url-input input:focus {
      border-color: var(--primary);
    }

    /* ===== BOUTON ===== */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 12px;
      color: #0A1128;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }

    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      max-width: 400px;
      margin: 0 auto;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(120px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      text-align: center;
    }

    .toast.show { transform: translateY(0); }
    .toast.success { background: #0D2A1F; border: 1px solid var(--success); color: var(--success); }
    .toast.error { background: #2A0D0D; border: 1px solid #EF4444; color: #EF4444; }
    .toast.info { background: #1A1A2E; border: 1px solid var(--primary); color: var(--primary-light); }

    @media (max-width: 500px) {
      .vendre-form .row-2 {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .page-header h1 { font-size: 24px; }
      .image-preview-container { height: 120px; }
    }
  </style>
</head>
<body>

<div class="gradient-bg"></div>

<!-- HEADER -->
<header class="header">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <a href="index.html" class="logo">N.I.<span>F</span></a>
  <div style="width:36px;"></div>
</header>

<main class="container">

  <!-- HEADER PAGE -->
  <div class="page-header">
    <div class="subtitle"><i class="fas fa-upload"></i> Publier une formation</div>
    <h1>📤 Vendre ma <span>Formation</span></h1>
    <p>Publiez votre formation et gagnez de l'argent. Publication payante selon le nombre de pages.</p>
  </div>

  <!-- FORMULAIRE -->
  <form class="vendre-form" id="vendreForm">

    <!-- Titre -->
    <div class="form-group">
      <label>Titre de la formation *</label>
      <input type="text" id="titre" placeholder="Ex: Maîtrise du trading" required>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label>Description *</label>
      <textarea id="description" placeholder="Décrivez votre formation en détail" required></textarea>
    </div>

    <!-- Catégorie + Prix -->
    <div class="row-2">
      <div class="form-group">
        <label>Catégorie *</label>
        <select id="categorie" required>
          <option value="Finance">💰 Finance</option>
          <option value="Marketing">📊 Marketing</option>
          <option value="Entrepreneuriat">🚀 Entrepreneuriat</option>
          <option value="Stratégie">🎯 Stratégie</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prix (FCFA) *</label>
        <input type="number" id="prix" placeholder="0 = Gratuit" value="0" required>
      </div>
    </div>

    <!-- Pages + Catégorie -->
    <div class="row-2">
      <div class="form-group">
        <label>Nombre de pages *</label>
        <input type="number" id="pages" placeholder="Nombre de pages" value="10" required>
        <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">
          💰 Coût de publication : <span id="coutPublication">0</span> FCFA
        </div>
      </div>
      <div class="form-group">
        <label>Fichier PDF</label>
        <input type="file" id="fichier" accept=".pdf">
        <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">
          📄 Format PDF uniquement
        </div>
      </div>
    </div>

    <!-- ===== IMAGE ===== -->
    <div class="image-upload-section">
      <div class="label-row">
        <label>Image de la formation</label>
        <span style="font-size: 10px; color: var(--text-dim);">(Optionnel)</span>
      </div>

      <!-- Méthodes d'import -->
      <div class="input-methods">
        <button type="button" class="method-btn active" data-method="upload">
          <i class="fas fa-images"></i> Galerie
        </button>
        <button type="button" class="method-btn" data-method="url">
          <i class="fas fa-link"></i> URL
        </button>
      </div>

      <!-- Upload depuis galerie -->
      <div id="uploadMethod">
        <div class="image-preview-container" id="imageDropZone">
          <div class="placeholder" id="imagePlaceholder">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Cliquez pour choisir une image</p>
            <p style="font-size: 10px; opacity: 0.6;">PNG, JPG, WebP</p>
          </div>
          <img id="imagePreview" style="display: none;" alt="Aperçu">
          <button type="button" class="remove-image" id="removeImageBtn">
            <i class="fas fa-times"></i>
          </button>
          <div class="upload-progress" id="uploadProgress"></div>
          <input type="file" id="imageFileInput" accept="image/*" style="display: none;">
        </div>
      </div>

      <!-- URL -->
      <div class="image-url-input" id="urlMethod">
        <input type="text" id="imageUrlInput" placeholder="https://exemple.com/image.jpg">
      </div>
    </div>

    <!-- Vendeur -->
    <div class="row-2">
      <div class="form-group">
        <label>Votre nom</label>
        <input type="text" id="vendeurNom" placeholder="Votre nom">
      </div>
      <div class="form-group">
        <label>Votre email</label>
        <input type="email" id="vendeurEmail" placeholder="votre@email.com">
      </div>
    </div>

    <!-- Bouton -->
    <button type="submit" class="btn-submit" id="submitBtn">
      <i class="fas fa-rocket"></i> Publier la formation
    </button>
  </form>

</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { 
    getFirestore, doc, getDoc, addDoc, collection, 
    updateDoc, arrayUnion, increment 
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
  import { 
    getStorage, ref, uploadBytesResumable, getDownloadURL 
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyDEjj2oAg7ZL8HvdkSWliShxydgq_BPxzs",
    authDomain: "brickshare-d35b3.firebaseapp.com",
    projectId: "brickshare-d35b3",
    storageBucket: "brickshare-d35b3.firebasestorage.app",
    messagingSenderId: "613227362818",
    appId: "1:613227362818:web:c4de1ad3372c16d8d3051b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // ===== DOM =====
  const form = document.getElementById('vendreForm');
  const submitBtn = document.getElementById('submitBtn');
  const toast = document.getElementById('toast');

  const titreInput = document.getElementById('titre');
  const descriptionInput = document.getElementById('description');
  const categorieSelect = document.getElementById('categorie');
  const prixInput = document.getElementById('prix');
  const pagesInput = document.getElementById('pages');
  const fichierInput = document.getElementById('fichier');
  const vendeurNomInput = document.getElementById('vendeurNom');
  const vendeurEmailInput = document.getElementById('vendeurEmail');
  const coutPublication = document.getElementById('coutPublication');

  // Image
  const imageFileInput = document.getElementById('imageFileInput');
  const imageDropZone = document.getElementById('imageDropZone');
  const imagePreview = document.getElementById('imagePreview');
  const imagePlaceholder = document.getElementById('imagePlaceholder');
  const removeImageBtn = document.getElementById('removeImageBtn');
  const uploadProgress = document.getElementById('uploadProgress');
  const imageUrlInput = document.getElementById('imageUrlInput');

  let currentUser = null;
  let userData = null;
  let selectedImageFile = null;
  let imageUrl = null;
  let imagePath = null;
  let isUploading = false;
  let currentMethod = 'upload';

  // ===== TOAST =====
  function showToast(message, type = 'success') {
    toast.textContent = message;
    toast.className = `toast ${type}`;
    setTimeout(() => toast.classList.add('show'), 50);
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ===== COÛT DE PUBLICATION =====
  function updateCoutPublication() {
    const pages = parseInt(pagesInput.value) || 0;
    const cout = pages * 250;
    coutPublication.textContent = cout.toLocaleString('fr-FR');
  }

  pagesInput.addEventListener('input', updateCoutPublication);
  updateCoutPublication();

  // ===== IMAGE - MÉTHODES =====
  document.querySelectorAll('.method-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMethod = btn.dataset.method;

      if (currentMethod === 'upload') {
        document.getElementById('uploadMethod').style.display = 'block';
        document.getElementById('urlMethod').classList.remove('visible');
      } else {
        document.getElementById('uploadMethod').style.display = 'none';
        document.getElementById('urlMethod').classList.add('visible');
      }
    });
  });

  // ===== IMAGE - UPLOAD =====
  imageDropZone.addEventListener('click', () => {
    if (!isUploading) imageFileInput.click();
  });

  imageFileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      const file = e.target.files[0];
      if (file.type.startsWith('image/')) {
        selectedImageFile = file;
        const reader = new FileReader();
        reader.onload = (event) => {
          imagePreview.src = event.target.result;
          imagePreview.style.display = 'block';
          imagePlaceholder.style.display = 'none';
          removeImageBtn.classList.add('show');
        };
        reader.readAsDataURL(file);
      } else {
        showToast('❌ Veuillez sélectionner une image', 'error');
      }
    }
  });

  // Drag & Drop
  imageDropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    imageDropZone.classList.add('dragover');
  });

  imageDropZone.addEventListener('dragleave', () => {
    imageDropZone.classList.remove('dragover');
  });

  imageDropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    imageDropZone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].type.startsWith('image/')) {
      selectedImageFile = files[0];
      const reader = new FileReader();
      reader.onload = (event) => {
        imagePreview.src = event.target.result;
        imagePreview.style.display = 'block';
        imagePlaceholder.style.display = 'none';
        removeImageBtn.classList.add('show');
      };
      reader.readAsDataURL(selectedImageFile);
    }
  });

  // Supprimer l'image
  removeImageBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    selectedImageFile = null;
    imagePreview.style.display = 'none';
    imagePlaceholder.style.display = 'block';
    removeImageBtn.classList.remove('show');
    uploadProgress.style.width = '0%';
    imageFileInput.value = '';
  });

   // ===== UPLOAD VERS FIREBASE STORAGE =====
  async function uploadImage(uid, formationId) {
    if (!selectedImageFile) return null;

    return new Promise((resolve, reject) => {
      const fileName = `${uid}_${formationId}_${Date.now()}.jpg`;
      const storageRef = ref(storage, `formations/${fileName}`);
      const uploadTask = uploadBytesResumable(storageRef, selectedImageFile);

      uploadTask.on('state_changed',
        (snapshot) => {
          isUploading = true;
          const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
          uploadProgress.style.width = `${progress}%`;
        },
        (error) => {
          console.error('Erreur upload:', error);
          isUploading = false;
          reject(error);
        },
        async () => {
          try {
            const url = await getDownloadURL(uploadTask.snapshot.ref);
            isUploading = false;
            uploadProgress.style.width = '100%';
            resolve({ url, path: `formations/${fileName}` });
          } catch (error) {
            isUploading = false;
            reject(error);
          }
        }
      );
    });
  }

  // ===== SOUMISSION =====
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!currentUser) {
      showToast('❌ Veuillez vous connecter', 'error');
      window.location.href = 'login.html';
      return;
    }

    const titre = titreInput.value.trim();
    const description = descriptionInput.value.trim();
    const categorie = categorieSelect.value;
    const prix = parseInt(prixInput.value) || 0;
    const pages = parseInt(pagesInput.value) || 0;
    const fichier = fichierInput.files[0];
    const vendeurNom = vendeurNomInput.value.trim() || userData?.fullName || 'Utilisateur';
    const vendeurEmail = vendeurEmailInput.value.trim() || userData?.email || '';

    if (!titre || !description) {
      showToast('❌ Titre et description sont obligatoires', 'error');
      return;
    }

    if (pages < 1) {
      showToast('❌ Minimum 1 page', 'error');
      return;
    }

    // Coût de publication
    const cout = pages * 250;
    if ((userData?.balance || 0) < cout) {
      showToast(`❌ Solde insuffisant ! Il vous manque ${(cout - (userData?.balance || 0)).toLocaleString('fr-FR')} FCFA`, 'error');
      return;
    }

    // Récupérer l'URL de l'image (upload ou URL)
    let finalImageUrl = '';
    let finalImagePath = '';

    if (currentMethod === 'upload' && selectedImageFile) {
      // Upload en cours...
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Upload de l\'image...';
      
      try {
        const tempId = 'temp_' + Date.now();
        const uploadResult = await uploadImage(currentUser.uid, tempId);
        if (uploadResult) {
          finalImageUrl = uploadResult.url;
          finalImagePath = uploadResult.path;
        }
      } catch (error) {
        console.error('Erreur upload image:', error);
        showToast('❌ Erreur lors de l\'upload de l\'image', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-rocket"></i> Publier la formation';
        return;
      }
    } else if (currentMethod === 'url') {
      finalImageUrl = imageUrlInput.value.trim();
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publication en cours...';

    try {
      // 1. Créer la formation
      const formationData = {
        titre,
        description,
        categorie,
        prix,
        pages,
        vendeurId: currentUser.uid,
        vendeurNom,
        vendeurEmail,
        image: finalImageUrl,
        imagePath: finalImagePath,
        acheteurs: [],
        nbAcheteurs: 0,
        statut: 'publie',
        dateCreation: new Date().toISOString(),
        estGratuit: prix === 0
      };

      const docRef = await addDoc(collection(db, 'formations'), formationData);
      const formationId = docRef.id;

      // 2. Upload du PDF si présent
      if (fichier && fichier.type === 'application/pdf') {
        const pdfRef = ref(storage, `formations/${formationId}/fichier.pdf`);
        await uploadBytesResumable(pdfRef, fichier);
        const pdfUrl = await getDownloadURL(pdfRef);
        await updateDoc(doc(db, 'formations', formationId), {
          fichierUrl: pdfUrl,
          fichierNom: fichier.name,
          fichierTaille: fichier.size
        });
      }

      // 3. Mettre à jour le solde de l'utilisateur
      const userRef = doc(db, 'users', currentUser.uid);
      await updateDoc(userRef, {
        balance: (userData?.balance || 0) - cout,
        totalVentes: (userData?.totalVentes || 0) + 1
      });

      // 4. Enregistrer la transaction
      await addDoc(collection(db, 'transactions'), {
        userId: currentUser.uid,
        type: 'publication',
        formationId: formationId,
        montant: cout,
        description: `Publication de "${titre}" (${pages} pages)`,
        date: new Date().toISOString(),
        statut: 'completé'
      });

      // 5. Mettre à jour les données locales
      userData.balance = (userData?.balance || 0) - cout;
      userData.totalVentes = (userData?.totalVentes || 0) + 1;

      showToast('✅ Formation publiée avec succès !', 'success');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);

    } catch (error) {
      console.error('Erreur publication:', error);
      showToast('❌ Erreur lors de la publication', 'error');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-rocket"></i> Publier la formation';
    }
  });

  // ===== CHARGER DONNÉES UTILISATEUR =====
  async function loadUserData(user) {
    try {
      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        userData = userSnap.data();
        if (!vendeurNomInput.value) {
          vendeurNomInput.value = userData.fullName || userData.prenom || '';
        }
        if (!vendeurEmailInput.value) {
          vendeurEmailInput.value = userData.email || '';
        }
      }
    } catch (error) {
      console.error('Erreur chargement user:', error);
    }
  }

  // ===== AUTH =====
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      localStorage.setItem('NIF_current_user', user.uid);
      loadUserData(user);
    } else {
      const savedUid = localStorage.getItem('NIF_current_user');
      if (savedUid) {
        setTimeout(() => {
          if (!auth.currentUser) {
            window.location.href = 'login.html';
          }
        }, 1500);
      } else {
        window.location.href = 'login.html';
      }
    }
  });

  console.log("✅ Page Vendre N.I.F chargée !");
</script>
