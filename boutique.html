    :root {
      --primary: #D4AF37;
      --primary-dark: #AA8417;
      --primary-light: #F3E5AB;
      --bg-dark: #0A1128;
      --bg-surface: #111A36;
      --text-light: #FFFFFF;
      --text-dim: #94A3B8;
      --card-bg: rgba(17, 26, 54, 0.65);
      --card-border: rgba(212, 175, 55, 0.12);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --glass-bg: rgba(212, 175, 55, 0.03);
      --glass-border: rgba(212, 175, 55, 0.08);

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 15%, rgba(212, 175, 55, 0.06) 0%, transparent 70%),

    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 17, 40, 0.95);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: 20px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }

    .logo span { color: var(--primary); }

    .back-btn {
      width: 36px;
      height: 36px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-btn:hover { border-color: var(--primary); }

    .cart-btn {
      width: 36px;
      height: 36px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
    }

    .cart-btn:hover { border-color: var(--primary); }

    .cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--primary);
      color: #0A1128;
      font-size: 9px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-badge.hidden { display: none; }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header .subtitle {
      font-size: 10px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      margin-top: 4px;
    }

    .page-header h1 span { color: var(--primary); font-style: italic; }

    .page-header p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 6px;
    }

    .filters-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }

    .filters-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 30px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }

    .filter-btn:active { transform: scale(0.95); }

    .filter-btn.active {
      background: var(--primary);
      color: #0A1128;
      border-color: var(--primary);
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--primary);
      color: var(--text-light);
    }

    .formations-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .formation-card {
      display: flex;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: var(--transition);
      height: 145px;
      cursor: pointer;
    }

    .formation-card:hover {
      border-color: rgba(212, 175, 55, 0.3);
      transform: translateY(-2px);
      background: rgba(17, 26, 54, 0.85);
    }

    .formation-card.bought {
      border-color: rgba(16, 185, 129, 0.3);
    }

    .formation-card .img-wrap {
      position: relative;
      width: 110px;
      min-width: 110px;
      height: 100%;
    }

    .formation-card .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.8);
      transition: var(--transition);
    }

    .formation-card:hover .img-wrap img {
      filter: brightness(0.95);
      transform: scale(1.03);
    }

    .formation-card .badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(10, 17, 40, 0.85);
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: var(--primary-light);
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .formation-card .badge.bought-badge {
      border-color: var(--success);
      color: var(--success);
    }

    .formation-card .badge.free-badge {
      border-color: var(--success);
      color: var(--success);
    }

    .formation-card .content {
      flex: 1;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .formation-card .title {
      font-size: 13px;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
      color: var(--text-light);
      line-height: 1.3;
      margin-bottom: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .formation-card .description {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .formation-card .meta-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .formation-card .meta-info .seller {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .formation-card .meta-info .seller i {
      color: var(--primary);
      font-size: 10px;
    }

    .formation-card .meta-info .buyers {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .formation-card .meta-info .buyers i {
      color: var(--success);
      font-size: 10px;
    }

    .formation-card .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .formation-card .price {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }

    .formation-card .price.free {
      color: var(--success);
    }

    .formation-card .price.bought-price {
      color: var(--success);
    }

    .formation-card .action {
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: var(--transition);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
    }

    .formation-card .action:hover {
      background: rgba(212, 175, 55, 0.08);
    }

    .formation-card .action.bought-action {
      color: var(--success);
    }

    .formation-card .action.bought-action:hover {
      background: rgba(16, 185, 129, 0.08);
    }

    .formation-card .action.in-cart {
      color: var(--warning);
    }

    .formation-card:hover .action i {
      transform: translateX(2px);
    }

    .cart-floating {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      max-width: 400px;
      margin: 0 auto;
      background: rgba(17, 26, 54, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 16px 20px;
      display: none;
      align-items: center;
      justify-content: space-between;
      z-index: 200;
      transform: translateY(120px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);

    .cart-floating.show {
      display: flex;
      transform: translateY(0);
    }

    .cart-floating .cart-info {

      align-items: center;
      gap: 12px;

      font-size: 18px;

      font-weight: 700;
      color: var(--primary);
    }

    .cart-floating .cart-info .total {
      color: var(--text-dim);
      font-size: 12px;
    }

      background: var(--primary);
      color: #0A1128;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .cart-floating .checkout-btn:active {
      transform: scale(0.95);
    }

    .cart-floating .checkout-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state i {
      font-size: 48px;
      color: var(--text-dim);
      opacity: 0.3;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--text-light);
    }

    .empty-state p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 8px;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      max-width: 400px;
      margin: 0 auto;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(120px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      text-align: center;
    }

    .toast.show { transform: translateY(0); }
    .toast.success { background: #0D2A1F; border: 1px solid var(--success); color: var(--success); }
    .toast.error { background: #2A0D0D; border: 1px solid #EF4444; color: #EF4444; }
    .toast.info { background: #1A1A2E; border: 1px solid var(--primary); color: var(--primary-light); }

    @media (max-width: 500px) {
      .formation-card { height: 130px; }
      .formation-card .img-wrap { width: 90px; min-width: 90px; }
      .page-header h1 { font-size: 24px; }
      .cart-floating { padding: 12px 16px; }
      .cart-floating .checkout-btn { padding: 8px 14px; font-size: 12px; }
    }

  // ===== INITIALISER LES FORMATIONS SI ELLES N'EXISTENT PAS =====
  async function initFormations() {
    if (isInitialized) return;
    
    try {
      console.log("🔍 Vérification des formations dans Firestore...");
      const formationsRef = collection(db, 'formations');
      const q = query(formationsRef, where('statut', '==', 'publie'));
      const snapshot = await getDocs(q);

      if (true) {
        console.log("📚 Aucune formation trouvée, création des 20 formations...");
        
        for (const f of FORMATIONS_INIT) {
          await addDoc(collection(db, 'formations'), {
            ...f,
            acheteurs: [],
            nbAcheteurs: 0,
            dateCreation: new Date().toISOString(),
            statut: 'publie',
            estGratuit: f.prix === 0,
            fichierUrl: '',
            imagePath: ''
          });
        }
        console.log("✅ 20 formations créées avec succès !");
        showToast('✅ 20 formations prêtes !', 'success');
      } else {
        console.log(`📚 ${snapshot.size} formations déjà présentes`);
      }
      isInitialized = true;
    } catch (error) {
      console.error('❌ Erreur initialisation formations:', error);
    }
  }

  // ===== TOAST =====
  function showToast(message, type = 'success') {
    toast.textContent = message;
    toast.className = `toast ${type}`;
    setTimeout(() => toast.classList.add('show'), 50);
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ===== PANIER =====
  function addToCart(formationId) {
    if (cart.includes(formationId)) {
      cart = cart.filter(id => id !== formationId);
    } else {
      cart.push(formationId);
    }
    updateCartUI();
    renderFormations();
    saveCart();
  }

  function updateCartUI() {
    const count = cart.length;
    cartCount.textContent = count;
    cartBadge.textContent = count;
    cartBadge.classList.toggle('hidden', count === 0);

    if (count > 0) {
      let total = 0;
      cart.forEach(id => {
        const f = allFormations.find(ff => ff.id === id);
        if (f) total += f.prix || 0;
      });
      cartTotal.textContent = total.toLocaleString('fr-FR');
      cartFloating.classList.add('show');
      checkoutBtn.disabled = false;
    } else {
      cartFloating.classList.remove('show');
    }
  }

  function saveCart() {
    localStorage.setItem('NIF_cart', JSON.stringify(cart));
  }

  function loadCart() {
    try {
      const saved = localStorage.getItem('NIF_cart');
      if (saved) {
        cart = JSON.parse(saved);
        updateCartUI();
      }
    } catch (e) {}
  }

  // ===== ACHETER TOUT LE PANIER =====
  async function checkoutCart() {
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    if (cart.length === 0) return;

    const total = cart.reduce((sum, id) => {
      const f = allFormations.find(ff => ff.id === id);
      return sum + (f?.prix || 0);
    }, 0);

    if (total > (userData?.balance || 0)) {
      showToast(`❌ Solde insuffisant ! Il vous manque ${(total - (userData?.balance || 0)).toLocaleString('fr-FR')} FCFA`, 'error');
      return;
    }

    if (!confirm(`Confirmer l'achat de ${cart.length} formation(s) pour ${total.toLocaleString('fr-FR')} FCFA ?`)) {
      return;
    }

    checkoutBtn.disabled = true;
    checkoutBtn.textContent = '⏳...';

    try {
      const userRef = doc(db, 'users', currentUser.uid);
      const newBalance = (userData?.balance || 0) - total;

      await updateDoc(userRef, {
        balance: newBalance,
        formationsAchetees: arrayUnion(...cart),
        totalAchats: (userData?.totalAchats || 0) + cart.length
      });

      for (const formationId of cart) {
        const formationRef = doc(db, 'formations', formationId);
        await updateDoc(formationRef, {
          acheteurs: arrayUnion(currentUser.uid),
          nbAcheteurs: increment(1)
        });

        await addDoc(collection(db, 'transactions'), {
          userId: currentUser.uid,
          type: 'achat',
          formationId: formationId,
          montant: allFormations.find(f => f.id === formationId)?.prix || 0,
          date: new Date().toISOString(),
          statut: 'completé'
        });
      }

      userData.balance = newBalance;
      userData.formationsAchetees = [...(userData.formationsAchetees || []), ...cart];
      userData.totalAchats = (userData.totalAchats || 0) + cart.length;

      showToast(`✅ ${cart.length} formation(s) achetée(s) avec succès !`, 'success');

      cart = [];
      saveCart();
      updateCartUI();
      renderFormations();

    } catch (error) {
      console.error('Erreur checkout:', error);
      showToast('❌ Erreur lors de l\'achat. Réessayez.', 'error');
    }

    checkoutBtn.disabled = false;
    checkoutBtn.textContent = 'Acheter tout';
  }

  checkoutBtn.addEventListener('click', checkoutCart);

  // ===== RECHERCHER LES FORMATIONS =====
  function loadFormations() {
    const formationsRef = collection(db, 'formations');
    const q = query(formationsRef, where('statut', '==', 'publie'));

    onSnapshot(q, (snapshot) => {
      if (snapshot.empty) {
        formationsList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-book-open"></i>
            <h3>Aucune formation disponible</h3>
            <p>Revenez plus tard, de nouvelles formations seront ajoutées.</p>
          </div>
        `;
        allFormations = [];
        return;
      }

      allFormations = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));

      renderFormations();

    }, (error) => {
      console.error('Erreur chargement formations:', error);
      formationsList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-circle"></i>
          <h3>Erreur de chargement</h3>
          <p>Impossible de charger les formations. Réessayez.</p>
        </div>
      `;
    });
  }

  // ===== AFFICHER LES FORMATIONS =====
  function renderFormations() {
    const userPurchases = userData?.formationsAchetees || [];
    const cartIds = cart;

    let filtered = allFormations;
    if (currentFilter !== 'all') {
      filtered = filtered.filter(f => f.categorie === currentFilter);
    }

    if (filtered.length === 0) {
      formationsList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-search"></i>
          <h3>Aucune formation dans cette catégorie</h3>
          <p>Essayez une autre catégorie.</p>
        </div>
      `;
      return;
    }

    formationsList.innerHTML = filtered.map(formation => {
      const isBought = userPurchases.includes(formation.id);
      const inCart = cartIds.includes(formation.id) && !isBought;
      const isFree = formation.prix === 0 || formation.prix === '0';

      const imageSrc = formation.image || formation.imageUrl || 'https://images.pexels.com/photos/3183197/pexels-photo-3183197.jpeg?auto=compress&cs=tinysrgb&w=200&h=240&fit=crop';

      const badgeText = isBought ? '✅ Possédé' : (isFree ? '🎁 Gratuit' : formation.categorie);
      const badgeClass = isBought ? 'bought-badge' : (isFree ? 'free-badge' : '');

      const priceText = isBought ? '📖 Débloqué' : (isFree ? 'GRATUIT' : `${(formation.prix || 0).toLocaleString('fr-FR')} FCFA`);
      const priceClass = isBought ? 'bought-price' : (isFree ? 'free' : '');

      const actionText = isBought ? 'Ouvrir' : (inCart ? 'Retirer' : 'Acheter');
      const actionClass = isBought ? 'bought-action' : (inCart ? 'in-cart' : '');

      const nbAcheteurs = formation.nbAcheteurs || 0;

      return `
        <div class="formation-card ${isBought ? 'bought' : ''}" data-id="${formation.id}">
          <div class="img-wrap">
            <img src="${imageSrc}" alt="${formation.titre}" loading="lazy">
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="content">
            <h3 class="title">${formation.titre || 'Formation'}</h3>
            <p class="description">${formation.description || ''}</p>
            <div class="meta-info">
              <span class="seller"><i class="fas fa-user"></i> ${formation.vendeurNom || 'N.I.F'}</span>
              <span class="buyers"><i class="fas fa-users"></i> ${nbAcheteurs} acheteur(s)</span>
            </div>
            <div class="footer">
              <span class="price ${priceClass}">${priceText}</span>
              <button class="action ${actionClass}" data-id="${formation.id}">
                ${actionText} <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.formation-card .action').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const formation = allFormations.find(f => f.id === id);
        if (!formation) return;

        const userPurchases = userData?.formationsAchetees || [];
        const isBought = userPurchases.includes(id);

        if (isBought) {
          if (formation.fichierUrl) {
            window.open(formation.fichierUrl, '_blank');
          } else {
            showToast('📄 PDF non disponible pour cette formation', 'info');
          }
        } else {
          addToCart(id);
        }
      });
    });

    document.querySelectorAll('.formation-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        const formation = allFormations.find(f => f.id === id);
        if (!formation) return;

        const userPurchases = userData?.formationsAchetees || [];
        const isBought = userPurchases.includes(id);

        if (isBought) {
          if (formation.fichierUrl) {
            window.open(formation.fichierUrl, '_blank');
          } else {
            showToast('📄 PDF non disponible pour cette formation', 'info');
          }
        } else {
          addToCart(id);
        }
      });
    });
  }

  // ===== FILTRES =====
  filtersBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderFormations();
  });

  // ===== CHARGER LES DONNÉES UTILISATEUR =====
  async function loadUserData(user) {
    try {
      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        userData = userSnap.data();
        userData.formationsAchetees = userData.formationsAchetees || [];
      } else {
        userData = {
          balance: 0,
          formationsAchetees: [],
          totalAchats: 0,
          totalVentes: 0,
          totalRevenus: 0,
          totalRetraits: 0
        };
      }

      onSnapshot(userRef, (snap) => {
        if (snap.exists()) {
          userData = snap.data();
          userData.formationsAchetees = userData.formationsAchetees || [];
          renderFormations();
        }
      });

      renderFormations();

    } catch (error) {
      console.error('Erreur chargement user:', error);
      renderFormations();
    }
  }

  // ===== AUTH =====
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      localStorage.setItem('NIF_current_user', user.uid);
      
      // Charger les données utilisateur
      loadUserData(user);
      
      // Charger les formations
      loadFormations();
      
      // Charger le panier
      loadCart();
      
      // INITIALISER LES FORMATIONS (après authentification)
      initFormations();
      
    } else {
      const savedUid = localStorage.getItem('NIF_current_user');
      if (savedUid) {
        setTimeout(() => {
          if (!auth.currentUser) {
            window.location.href = 'login.html';
          }
        }, 1500);
      } else {
        window.location.href = 'login.html';
      }
    }
  });

  console.log("✅ Boutique N.I.F chargée !");
  console.log("📚 Les formations seront créées automatiquement si elles n'existent pas");
</script>
