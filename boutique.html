<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A1128">
  <meta name="description" content="N.I.F - Boutique de formations">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #D4AF37;
      --primary-dark: #AA8417;
      --primary-light: #F3E5AB;
      --bg-dark: #0A1128;
      --bg-surface: #111A36;
      --text-light: #FFFFFF;
      --text-dim: #94A3B8;
      --card-bg: rgba(17, 26, 54, 0.65);
      --card-border: rgba(212, 175, 55, 0.12);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --glass-bg: rgba(212, 175, 55, 0.03);
      --glass-border: rgba(212, 175, 55, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 15%, rgba(212, 175, 55, 0.06) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 85% 85%, rgba(16, 185, 129, 0.03) 0%, transparent 60%),
                  linear-gradient(180deg, #0A1128 0%, #070C1E 100%);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 17, 40, 0.95);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: 20px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }

    .logo span { color: var(--primary); }

    .back-btn {
      width: 36px;
      height: 36px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-btn:hover { border-color: var(--primary); }

    .cart-btn {
      width: 36px;
      height: 36px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
    }

    .cart-btn:hover { border-color: var(--primary); }

    .cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--primary);
      color: #0A1128;
      font-size: 9px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-badge.hidden { display: none; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      margin-bottom: 24px;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-header .subtitle {
      font-size: 10px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      margin-top: 4px;
    }

    .page-header h1 span { color: var(--primary); font-style: italic; }

    .page-header p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 6px;
    }

    /* ===== STATS ===== */
    .boutique-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
      animation: fadeInUp 0.7s ease-out;
    }

    .stat-mini-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      transition: var(--transition);
    }

    .stat-mini-card:hover {
      border-color: rgba(212, 175, 55, 0.3);
      transform: translateY(-2px);
    }

    .stat-mini-card .stat-number {
      font-size: 20px;
      font-weight: 800;
      font-family: 'Playfair Display', serif;
      color: var(--primary);
    }

    .stat-mini-card .stat-label {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* ===== FILTRES ===== */
    .filters-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 20px;
      scrollbar-width: none;
      animation: fadeInUp 0.8s ease-out;
    }

    .filters-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 30px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }

    .filter-btn:active { transform: scale(0.95); }

    .filter-btn.active {
      background: var(--primary);
      color: #0A1128;
      border-color: var(--primary);
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--primary);
      color: var(--text-light);
    }

    /* ===== FORMATIONS GRID ===== */
    .formations-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ===== CARTE FORMATION (style image) ===== */
    .formation-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
      animation: fadeInUp 0.5s ease-out;
      animation-fill-mode: both;
    }

    .formation-card:hover {
      border-color: rgba(212, 175, 55, 0.3);
      transform: translateY(-4px);
      background: rgba(17, 26, 54, 0.85);
    }

    .formation-card.bought {
      border-color: rgba(16, 185, 129, 0.3);
    }

    /* Image */
    .formation-card .card-image {
      position: relative;
      width: 100%;
      height: 160px;
      overflow: hidden;
    }

    .formation-card .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .formation-card:hover .card-image img {
      transform: scale(1.03);
    }

    /* Badge */
    .formation-card .card-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--primary);
      color: #0A1128;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .formation-card .card-badge.bought-badge {
      background: var(--success);
    }

    .formation-card .card-badge.free-badge {
      background: var(--success);
    }

    /* Contenu */
    .formation-card .card-content {
      padding: 16px 18px 18px;
    }

    .formation-card .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .formation-card .card-description {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .formation-card .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .formation-card .card-meta .seller {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .formation-card .card-meta .seller i {
      color: var(--primary);
      font-size: 11px;
    }

    .formation-card .card-meta .buyers {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .formation-card .card-meta .buyers i {
      color: var(--success);
      font-size: 11px;
    }

    /* Footer de la carte */
    .formation-card .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .formation-card .card-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .formation-card .card-price.free {
      color: var(--success);
    }

    .formation-card .card-price.bought-price {
      color: var(--success);
    }

    .formation-card .card-action {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 30px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .formation-card .card-action:active {
      transform: scale(0.95);
    }

    .formation-card .card-action:hover {
      background: rgba(212, 175, 55, 0.2);
    }

    .formation-card .card-action.bought-action {
      background: rgba(16, 185, 129, 0.12);
      border-color: rgba(16, 185, 129, 0.3);
      color: var(--success);
    }

    .formation-card .card-action.bought-action:hover {
      background: rgba(16, 185, 129, 0.2);
    }

    .formation-card .card-action.in-cart {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
      color: var(--warning);
    }

    .formation-card .card-action i {
      font-size: 12px;
    }

    /* ===== MODAL DÉTAIL ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(3, 3, 5, 0.85);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: linear-gradient(180deg, rgba(17, 26, 54, 0.95), rgba(10, 17, 40, 0.98));
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.show .modal-content {
      transform: scale(1) translateY(0);
    }

    .modal-content::-webkit-scrollbar {
      width: 3px;
    }
    .modal-content::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.08);
      position: sticky;
      top: 0;
      background: rgba(10, 17, 40, 0.95);
      border-radius: 24px 24px 0 0;
      z-index: 10;
    }

    .modal-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
    }

    .modal-header h3 span { color: var(--primary); font-style: italic; }

    .modal-close {
      width: 36px;
      height: 36px;
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 10px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .modal-close:hover {
      background: rgba(212, 175, 55, 0.15);
      color: var(--text-light);
    }

    .modal-body {
      padding: 20px;
    }

    .modal-body .detail-image {
      width: 100%;
      height: 200px;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 16px;
    }

    .modal-body .detail-title {
      font-size: 20px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      margin-bottom: 8px;
    }

    .modal-body .detail-description {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .modal-body .detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .modal-body .detail-meta-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }

    .modal-body .detail-meta-item .label {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-body .detail-meta-item .value {
      font-size: 14px;
      font-weight: 600;
      margin-top: 2px;
    }

    .modal-body .detail-price {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      text-align: center;
      margin: 16px 0;
    }

    .modal-body .detail-price.free {
      color: var(--success);
    }

    .modal-body .detail-actions {
      display: flex;
      gap: 12px;
    }

    .modal-body .detail-actions button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .modal-body .detail-actions button:active {
      transform: scale(0.96);
    }

    .btn-add-cart {
      background: rgba(212, 175, 55, 0.15);
      color: var(--primary);
      border: 1px solid rgba(212, 175, 55, 0.3) !important;
    }

    .btn-add-cart:hover {
      background: rgba(212, 175, 55, 0.25);
    }

    .btn-add-cart.in-cart {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border-color: rgba(245, 158, 11, 0.3) !important;
    }

    .btn-buy-now {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #0A1128;
    }

    .btn-buy-now:hover {
      opacity: 0.9;
    }

    .btn-buy-now:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-buy-now.bought {
      background: var(--success);
    }

    /* ===== MODAL PANIER ===== */
    .cart-modal .modal-content {
      max-width: 380px;
    }

    .cart-modal .cart-items {
      max-height: 350px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .cart-modal .cart-items::-webkit-scrollbar {
      width: 2px;
    }
    .cart-modal .cart-items::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item .item-info {
      flex: 1;
    }

    .cart-item .item-info .item-title {
      font-size: 13px;
      font-weight: 600;
    }

    .cart-item .item-info .item-price {
      font-size: 11px;
      color: var(--primary);
      font-weight: 600;
    }

    .cart-item .item-remove {
      width: 30px;
      height: 30px;
      background: rgba(239, 68, 68, 0.1);
      border: none;
      border-radius: 8px;
      color: var(--danger);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-item .item-remove:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .cart-empty {
      text-align: center;
      padding: 30px 0;
      color: var(--text-dim);
    }

    .cart-empty i {
      font-size: 40px;
      opacity: 0.3;
      margin-bottom: 12px;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-top: 1px solid rgba(212, 175, 55, 0.15);
      font-size: 16px;
      font-weight: 700;
    }

    .cart-total .total-price {
      color: var(--primary);
    }

    .cart-checkout-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 12px;
      color: #0A1128;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .cart-checkout-btn:active {
      transform: scale(0.97);
    }

    .cart-checkout-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      max-width: 400px;
      margin: 0 auto;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(120px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      text-align: center;
    }

    .toast.show { transform: translateY(0); }
    .toast.success { background: #0D2A1F; border: 1px solid var(--success); color: var(--success); }
    .toast.error { background: #2A0D0D; border: 1px solid #EF4444; color: #EF4444; }
    .toast.info { background: #1A1A2E; border: 1px solid var(--primary); color: var(--primary-light); }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state i {
      font-size: 48px;
      color: var(--text-dim);
      opacity: 0.3;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--text-light);
    }

    .empty-state p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 8px;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */

      @media (max-width: 550px) {
      .page-header h1 { font-size: 24px; }
      .boutique-stats { gap: 8px; }
      .stat-mini-card .stat-number { font-size: 16px; }
      .formation-card .card-image { height: 130px; }
      .formation-card .card-title { font-size: 15px; }
      .formation-card .card-price { font-size: 16px; }
      .modal-body .detail-actions { flex-direction: column; }
      .modal-content { max-width: 100%; margin: 10px; border-radius: 16px; }
    }

    /* ===== TABLETTE (>= 768px) ===== */
    @media (min-width: 768px) {
      .container {
        max-width: 700px;
        padding: 30px 24px 60px;
      }

      .header {
        padding: 16px 5%;
      }

      .logo {
        font-size: 24px;
      }

      .page-header h1 {
        font-size: 32px;
      }

      .formations-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }

      .formation-card .card-image {
        height: 150px;
      }
    }

    /* ===== ORDINATEUR (>= 1024px) ===== */
    @media (min-width: 1024px) {
      .container {
        max-width: 960px;
        padding: 40px 32px 80px;
      }

      .formations-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
      }

      .formation-card .card-image {
        height: 180px;
      }

      .formation-card .card-title {
        font-size: 18px;
      }

      .stat-mini-card .stat-number {
        font-size: 24px;
      }

      .boutique-stats {
        gap: 16px;
      }
    }

    /* ===== GRAND ÉCRAN (>= 1280px) ===== */
    @media (min-width: 1280px) {

  // ===== MODAL DÉTAIL =====
  function openDetailModal(formation) {

        <i class="fas fa-bolt"></i> Acheter tout (${cart.length})
      </button>
    `;

      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        cart = cart.filter(c => c !== id);
        saveCart();
        updateCartBadge();
        renderCartModal();
        renderFormations();
        if (cart.length === 0) closeCartModal();
      });
    });

    document.getElementById('cartCheckoutBtn').addEventListener('click', checkoutCart);
  }

  // ===== ACHETER TOUT LE PANIER =====
  async function checkoutCart() {
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    if (cart.length === 0) return;

    const total = cart.reduce((sum, id) => {
      const f = allFormations.find(ff => ff.id === id);
      return sum + (f?.prix || 0);
    }, 0);

    if (total > (userData?.balance || 0)) {
      showToast(`❌ Solde insuffisant ! Il vous manque ${(total - (userData?.balance || 0)).toLocaleString('fr-FR')} FCFA`, 'error');
      return;
    }

    if (!confirm(`Confirmer l'achat de ${cart.length} formation(s) pour ${total.toLocaleString('fr-FR')} FCFA ?`)) {
      return;
    }

    const checkoutBtn = document.getElementById('cartCheckoutBtn');
    checkoutBtn.disabled = true;
    checkoutBtn.textContent = '⏳...';

    try {
      const userRef = doc(db, 'users', currentUser.uid);
      const newBalance = (userData?.balance || 0) - total;

      await updateDoc(userRef, {
        balance: newBalance,
        formationsAchetees: arrayUnion(...cart),
        totalAchats: (userData?.totalAchats || 0) + cart.length
      });

      for (const formationId of cart) {
        const formationRef = doc(db, 'formations', formationId);
        await updateDoc(formationRef, {
          acheteurs: arrayUnion(currentUser.uid),
          nbAcheteurs: increment(1)
        });

        await addDoc(collection(db, 'transactions'), {
          userId: currentUser.uid,
          type: 'achat',
          formationId: formationId,
          montant: allFormations.find(f => f.id === formationId)?.prix || 0,
          date: new Date().toISOString(),
          statut: 'completé'
        });
      }

      userData.balance = newBalance;
      userData.formationsAchetees = [...(userData.formationsAchetees || []), ...cart];
      userData.totalAchats = (userData.totalAchats || 0) + cart.length;

      showToast(`✅ ${cart.length} formation(s) achetée(s) avec succès !`, 'success');

      cart = [];
      saveCart();
      updateCartBadge();
      closeCartModal();
      renderFormations();

    } catch (error) {
      console.error('Erreur checkout:', error);
      showToast('❌ Erreur lors de l\'achat. Réessayez.', 'error');
    }

    checkoutBtn.disabled = false;
    checkoutBtn.textContent = `Acheter tout (${cart.length})`;
  }

    {
      titre: "Prise de Décision Stratégique",

    },
    {
      titre: "Gestion de Projet & Méthodes Agiles",
      description: "Maîtrisez les méthodologies de gestion de projet et les approches agiles (Scrum, Kanban) pour livrer plus efficacement.",
      categorie: "Stratégie",
      prix: 24000,
      vendeurNom: "M. Modou Faye",
      vendeurEmail: "modou@nif.com",
      pages: 32,
      image: "https://images.pexels.com/photos/3184357/pexels-photo-3184357.jpeg?auto=compress&cs=tinysrgb&w=200&h=240&fit=crop"

    {
      titre: "Lancement d'Entreprise: Guide Complet",
      description: "De l'idée à la création, toutes les étapes pour lancer votre entreprise et réussir dans votre secteur.",
      categorie: "Stratégie",
      prix: 26000,
      vendeurNom: "M. Youssoupha Ndiaye",

      pages: 42,
      image: "https://images.pexels.com/photos/3183197/pexels-photo-3183197.jpeg?auto=compress&cs=tinysrgb&w=200&h=240&fit=crop"
    }
  ];

  // ===== VARIABLE POUR ÉVITER LES DOUBLONS =====
let isInitialized = false;

async function initFormations() {
  // Éviter d'exécuter plusieurs fois
  if (isInitialized) return;
  
  try {
    const formationsRef = collection(db, 'formations');
    const snapshot = await getDocs(formationsRef); // Récupérer TOUTES les formations

    // Si aucune formation n'existe, on crée les 20
    if (snapshot.empty) {
      console.log("📚 Création des 20 formations...");
      for (const f of FORMATIONS_INIT) {
        await addDoc(collection(db, 'formations'), {
          ...f,
          acheteurs: [],
          nbAcheteurs: 0,
          dateCreation: new Date().toISOString(),
          statut: 'publie',
          estGratuit: f.prix === 0,
          fichierUrl: '',
          imagePath: ''
        });
      }
      console.log("✅ 20 formations créées !");
    } else {
      console.log(`📚 ${snapshot.size} formations déjà présentes`);
    }
    
    isInitialized = true;
    
  } catch (error) {
    console.error('❌ Erreur init formations:', error);
  }
}

  // ===== CHARGER LES FORMATIONS =====
  function loadFormations() {
    const formationsRef = collection(db, 'formations');
    const q = query(formationsRef, where('statut', '==', 'publie'));

    onSnapshot(q, (snapshot) => {
      if (snapshot.empty) {
        formationsList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-book-open"></i>
            <h3>Aucune formation disponible</h3>
            <p>Revenez plus tard, de nouvelles formations seront ajoutées.</p>
          </div>
        `;
        allFormations = [];
        updateStats();
        return;
      }

      allFormations = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));

      updateStats();
      renderFormations();

    }, (error) => {
      console.error('Erreur chargement formations:', error);
    });
  }

  // ===== METTRE À JOUR LES STATS =====
  function updateStats() {
    const total = allFormations.length;
    statFormations.textContent = total;

    let totalAcheteurs = 0;
    allFormations.forEach(f => {
      totalAcheteurs += f.nbAcheteurs || 0;
    });
    statAcheteurs.textContent = totalAcheteurs;

    const avgNote = 4.8;
    statNote.textContent = avgNote.toFixed(1);
  }

  // ===== AFFICHER LES FORMATIONS =====
  function renderFormations() {
    const userPurchases = userData?.formationsAchetees || [];
    const cartIds = cart;

    let filtered = allFormations;
    if (currentFilter !== 'all') {
      filtered = filtered.filter(f => f.categorie === currentFilter);
    }

    if (filtered.length === 0) {
      formationsList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-search"></i>
          <h3>Aucune formation dans cette catégorie</h3>
          <p>Essayez une autre catégorie.</p>
        </div>
      `;
      return;
    }

    formationsList.innerHTML = filtered.map((formation, index) => {
      const isBought = userPurchases.includes(formation.id);
      const inCart = cartIds.includes(formation.id) && !isBought;
      const isFree = formation.prix === 0 || formation.prix === '0';

      const imageSrc = formation.image || formation.imageUrl || 'https://images.pexels.com/photos/3183197/pexels-photo-3183197.jpeg?auto=compress&cs=tinysrgb&w=200&h=240&fit=crop';

      let badgeText = formation.categorie || 'Formation';
      let badgeClass = '';
      if (isBought) {
        badgeText = '✅ Possédé';
        badgeClass = 'bought-badge';
      } else if (isFree) {
        badgeText = '🎁 Gratuit';
        badgeClass = 'free-badge';
      }

      const priceText = isBought ? '📖 Débloqué' : (isFree ? 'GRATUIT' : `${(formation.prix || 0).toLocaleString('fr-FR')} FCFA`);
      const priceClass = isBought ? 'bought-price' : (isFree ? 'free' : '');

      const actionText = isBought ? 'Ouvrir' : (inCart ? 'Retirer' : 'Acheter');
      const actionClass = isBought ? 'bought-action' : (inCart ? 'in-cart' : '');

      const delay = index * 0.05;

      return `
        <div class="formation-card ${isBought ? 'bought' : ''}" data-id="${formation.id}" style="animation-delay: ${delay}s">
          <div class="card-image">
            <img src="${imageSrc}" alt="${formation.titre}" loading="lazy">
            <span class="card-badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="card-content">
            <h3 class="card-title">${formation.titre || 'Formation'}</h3>
            <p class="card-description">${formation.description || ''}</p>
            <div class="card-meta">
              <span class="seller"><i class="fas fa-user"></i> ${formation.vendeurNom || 'N.I.F'}</span>
              <span class="buyers"><i class="fas fa-users"></i> ${formation.nbAcheteurs || 0}</span>
            </div>
            <div class="card-footer">
              <span class="card-price ${priceClass}">${priceText}</span>
              <button class="card-action ${actionClass}" data-id="${formation.id}">
                ${actionText} <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // ===== ÉVÉNEMENTS =====
    document.querySelectorAll('.formation-card .card-action').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const formation = allFormations.find(f => f.id === id);
        if (!formation) return;

        const isBought = userData?.formationsAchetees?.includes(id) || false;

        if (isBought) {
          if (formation.fichierUrl) {
            window.open(formation.fichierUrl, '_blank');
          } else {
            window.location.href = `formation.html?id=${id}`;
          }
        } else {
          addToCart(id);
        }
      });
    });

    // ===== CLIC SUR LA CARTE (ouvre le modal) =====
    document.querySelectorAll('.formation-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        const formation = allFormations.find(f => f.id === id);
        if (!formation) return;

        const isBought = userData?.formationsAchetees?.includes(id) || false;

        if (isBought) {
          if (formation.fichierUrl) {
            window.open(formation.fichierUrl, '_blank');
          } else {
            window.location.href = `formation.html?id=${id}`;
          }
        } else {
          openDetailModal(formation);
        }
      });
    });
  }

  // ===== FILTRES =====
  filtersBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderFormations();
  });

  // ===== CHARGER LES DONNÉES UTILISATEUR =====
  async function loadUserData(user) {
    try {
      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        userData = userSnap.data();
        userData.formationsAchetees = userData.formationsAchetees || [];
      } else {
        userData = {
          balance: 0,
          formationsAchetees: [],
          totalAchats: 0,
          totalVentes: 0,
          totalRevenus: 0,
          totalRetraits: 0
        };
      }

      onSnapshot(userRef, (snap) => {
        if (snap.exists()) {
          userData = snap.data();
          userData.formationsAchetees = userData.formationsAchetees || [];
          renderFormations();
        }
      });

      renderFormations();

    } catch (error) {
      console.error('Erreur chargement user:', error);
      renderFormations();
    }
  }

  // ===== AUTH =====
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      localStorage.setItem('NIF_current_user', user.uid);
      loadUserData(user);
      loadFormations();
      loadCart();
      initFormations();
    } else {
      const savedUid = localStorage.getItem('NIF_current_user');
      if (savedUid) {
        setTimeout(() => {
          if (!auth.currentUser) {
            window.location.href = 'login.html';
          }
        }, 1500);
      } else {
        window.location.href = 'login.html';
      }
    }
  });

  console.log("✅ Boutique N.I.F chargée !");
  console.log("📚 Mode grille avec cartes style image");
</script>
