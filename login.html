<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A1128">
  <meta name="description" content="N.I.F - Connexion">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #D4AF37;
      --primary-dark: #AA8417;
      --primary-light: #F3E5AB;
      --bg-dark: #0A1128;
      --bg-surface: #111A36;
      --text-light: #FFFFFF;
      --text-dim: #94A3B8;
      --card-bg: rgba(17, 26, 54, 0.8);
      --card-border: rgba(212, 175, 55, 0.2);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --glass-bg: rgba(212, 175, 55, 0.03);
      --glass-border: rgba(212, 175, 55, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse 60% 50% at 15% 15%, rgba(212, 175, 55, 0.08) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 85% 85%, rgba(16, 185, 129, 0.04) 0%, transparent 60%),
                  linear-gradient(180deg, #0A1128 0%, #070C1E 100%);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 17, 40, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-decoration: none;
    }

    .logo-text span {
      color: var(--primary);
    }

    .register-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 30px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .register-link:active {
      transform: scale(0.97);
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== CARD ===== */
    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px 24px;
      animation: fadeInUp 0.5s ease-out;
      width: 100%;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== HEADER PAGE ===== */
    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-title {
      font-size: 26px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }

    .login-title span {
      color: var(--primary);
      font-style: italic;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* ===== MESSAGE ===== */
    .message-banner {
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      animation: fadeInUp 0.3s ease;
    }

    .message-banner.hidden {
      display: none;
    }

    .message-banner.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
    }

    .message-banner.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #A7F3D0;
    }

    .message-banner.warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #FDE68A;
    }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-dim);
      font-size: 13px;
      z-index: 2;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: rgba(10, 17, 40, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      color: var(--text-light);
      font-size: 14px;
      transition: var(--transition);
      outline: none;
    }

    .input-wrapper input:focus {
      border-color: var(--primary);
      background: rgba(10, 17, 40, 0.95);
    }

    .input-wrapper input::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }

    .input-wrapper .input-error {
      border-color: var(--danger);
    }

    /* ===== TOGGLE PASSWORD ===== */
    .toggle-password {
      position: absolute;
      right: 14px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      z-index: 2;
      transition: var(--transition);
    }

    .toggle-password:hover {
      color: var(--primary);
    }

    /* ===== CHECKBOX ===== */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 6px;
      padding: 4px 0;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .checkbox-group label {
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      line-height: 1.4;
      text-transform: none;
      letter-spacing: 0;
    }

    /* ===== SUBMIT ===== */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 14px;
      color: #0A1128;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: #0A1128;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .submit-btn.loading .btn-spinner {
      display: inline-block;
    }

    .submit-btn.loading .btn-text {
      display: none;
    }

    .submit-btn.loading .btn-icon {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== FOOTER ===== */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .login-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* ===== FOOTER SITE ===== */
    .site-footer {
      text-align: center;
      padding: 20px 16px 10px;
      border-top: 1px solid rgba(212, 175, 55, 0.06);
      margin-top: 10px;
    }

    .site-footer p {
      color: var(--text-dim);
      font-size: 11px;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */

    /* ===== TABLETTE (>= 768px) ===== */
    @media (min-width: 768px) {
      .container {
        max-width: 700px;
        padding: 30px 24px 60px;
      }

      .login-card {
        padding: 40px 36px;
        border-radius: 32px;
      }

      .login-title {
        font-size: 30px;
      }

      .header {
        padding: 16px 5%;
      }

      .logo-text {
        font-size: 26px;
      }

      .register-link {
        font-size: 14px;
        padding: 10px 20px;
      }

      .submit-btn {
        padding: 16px;
        font-size: 16px;
      }
    }

    /* ===== ORDINATEUR (>= 1024px) ===== */
    @media (min-width: 1024px) {
      .container {
        max-width: 900px;
        padding: 40px 32px 80px;
      }

      .login-card {
        padding: 48px 44px;
        border-radius: 36px;
        max-width: 520px;
        margin: 0 auto;
      }

      .login-title {
        font-size: 34px;
      }

      .login-subtitle {
        font-size: 15px;
      }

      .form-group label {
        font-size: 12px;
      }

      .input-wrapper input {
        padding: 14px 16px 14px 46px;
        font-size: 15px;
        border-radius: 14px;
      }

      .input-wrapper .input-icon {
        left: 16px;
        font-size: 15px;
      }

      .checkbox-group label {
        font-size: 13px;
      }

      .submit-btn {
        padding: 18px;
        font-size: 17px;
        border-radius: 16px;
        margin-top: 12px;
      }

      .login-footer {
        font-size: 14px;
        margin-top: 28px;
      }

      .site-footer p {
        font-size: 12px;
      }
    }

    /* ===== GRAND ÉCRAN (>= 1280px) ===== */
    @media (min-width: 1280px) {
      .login-card {
        padding: 56px 52px;
        border-radius: 40px;
        max-width: 580px;
      }

      .login-title {
        font-size: 38px;
      }

      .input-wrapper input {
        padding: 16px 18px 16px 50px;
        font-size: 16px;
      }

      .input-wrapper .input-icon {
        left: 18px;
        font-size: 16px;
      }
    }

    /* ===== PETIT TÉLÉPHONE (< 400px) ===== */
    @media (max-width: 399px) {
      .login-card {
        padding: 20px 14px;
        border-radius: 20px;
      }

      .login-title {
        font-size: 20px;
      }

      .login-subtitle {
        font-size: 12px;
      }

      .input-wrapper input {
        padding: 10px 12px 10px 36px;
        font-size: 13px;
      }

      .input-wrapper .input-icon {
        left: 10px;
        font-size: 12px;
      }

      .submit-btn {
        padding: 12px;
        font-size: 14px;
      }

      .login-footer {
        font-size: 12px;
      }

      .checkbox-group label {
        font-size: 11px;
      }

      .checkbox-group input[type="checkbox"] {
        width: 16px;
        height: 16px;
        min-width: 16px;
      }
    }
  </style>
</head>
<body>

<div class="gradient-bg"></div>

<!-- HEADER -->
<header class="header">
  <a href="index.html" class="logo-text">N.I.<span>F</span></a>
  <a href="register.html" class="register-link"><i class="fas fa-user-plus"></i> Créer un compte</a>
</header>

<!-- MAIN -->
<main class="container">
  <div class="login-card">

    <!-- HEADER -->
    <div class="login-header">
      <h1 class="login-title">Bienvenue <span>sur N.I.F</span></h1>
      <p class="login-subtitle">Connectez-vous à votre espace</p>
    </div>

    <!-- MESSAGE -->
    <div id="messageBanner" class="message-banner hidden">
      <i id="messageIcon" class="fas fa-info-circle"></i>
      <span id="messageText"></span>
    </div>

    <!-- FORM -->
    <form id="loginForm" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="email" placeholder="exemple@email.com" autocomplete="email" required>
        </div>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password" required>
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>
      </div>

      <!-- Se souvenir de moi -->
      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Se souvenir de moi</label>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-icon"><i class="fas fa-sign-in-alt"></i></span>
        <span class="btn-text">Se connecter</span>
        <span class="btn-spinner"></span>
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      Pas encore de compte ? <a href="register.html">Créer un compte</a>
    </div>

  </div>
</main>

<!-- FOOTER SITE -->
<footer class="site-footer">
  <p>&copy; 2026 N.I.F - Niger Investment & Finance</p>
</footer>

<!-- ===== IMPORTS ===== -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyDEjj2oAg7ZL8HvdkSWliShxydgq_BPxzs",
    authDomain: "brickshare-d35b3.firebaseapp.com",
    projectId: "brickshare-d35b3",
    storageBucket: "brickshare-d35b3.firebasestorage.app",
    messagingSenderId: "613227362818",
    appId: "1:613227362818:web:c4de1ad3372c16d8d3051b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  setPersistence(auth, browserLocalPersistence);

  // ===== DOM =====
  const form = document.getElementById('loginForm');
  const submitBtn = document.getElementById('submitBtn');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const rememberMe = document.getElementById('rememberMe');
  const togglePassword = document.getElementById('togglePassword');

  const messageBanner = document.getElementById('messageBanner');
  const messageIcon = document.getElementById('messageIcon');
  const messageText = document.getElementById('messageText');

  // ===== TOGGLE PASSWORD =====
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.classList.toggle('fa-eye');
    togglePassword.classList.toggle('fa-eye-slash');
  });

  // ===== CHARGER L'EMAIL SAUVEGARDÉ =====
  const savedEmail = localStorage.getItem('NIF_saved_email');
  if (savedEmail) {
    emailInput.value = savedEmail;
    rememberMe.checked = true;
  }

  // ===== MESSAGE =====
  function showMessage(text, type = 'error') {
    messageBanner.className = `message-banner ${type}`;
    messageIcon.className = type === 'error' ? 'fas fa-exclamation-circle' :
                           (type === 'success' ? 'fas fa-check-circle' : 'fas fa-info-circle');
    messageText.textContent = text;
    messageBanner.classList.remove('hidden');

    if (type === 'success') {
      setTimeout(() => messageBanner.classList.add('hidden'), 5000);
    }
  }

  function hideMessage() {
    messageBanner.classList.add('hidden');
  }

  // ===== SUBMIT =====
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMessage();

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      showMessage('Veuillez remplir tous les champs.', 'error');
      return;
    }

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    try {
      // 1. Connexion Firebase Auth
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // 2. Vérifier que l'utilisateur existe dans Firestore
      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        // L'utilisateur existe dans Auth mais pas dans Firestore
        // On le crée automatiquement
        const now = new Date().toISOString();
        const userData = {
          uid: user.uid,
          email: user.email,
          fullName: user.displayName || user.email?.split('@')[0] || 'Investisseur',
          nom: '',
          prenom: '',
          phone: '',
          pays: '',
          balance: 0,
          totalDepots: 0,
          totalRetraits: 0,
          totalAchats: 0,
          totalVentes: 0,
          totalRevenus: 0,
          formationsAchetees: [],
          status: 'active',
          role: 'user',
          createdAt: now,
          registrationDate: now,
          lastLogin: now,
          notificationPreferences: {
            ventes: true,
            achats: true,
            promotions: true
          }
        };
        await setDoc(userRef, userData);
        console.log('✅ Document utilisateur créé pour:', user.email);
      }

      // 3. Sauvegarder "Se souvenir de moi"
      if (rememberMe.checked) {
        localStorage.setItem('NIF_saved_email', email);
      } else {
        localStorage.removeItem('NIF_saved_email');
      }

      // 4. Stockage local
      localStorage.setItem('NIF_current_user', user.uid);

      
               // 5. Récupérer le nom pour l'affichage
      if (userSnap.exists()) {
        const data = userSnap.data();
        if (data.fullName) {
          localStorage.setItem('NIF_user_name', data.fullName);
        }
      }

      showMessage('✅ Connexion réussie !', 'success');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);

    } catch (error) {
      console.error('❌ Erreur connexion:', error);

      let errorMsg = 'Erreur lors de la connexion.';

      switch (error.code) {
        case 'auth/invalid-email':
          errorMsg = 'Email invalide.';
          break;
        case 'auth/user-not-found':
          errorMsg = 'Aucun compte trouvé avec cet email. Créez un compte.';
          break;
        case 'auth/wrong-password':
          errorMsg = 'Mot de passe incorrect.';
          break;
        case 'auth/invalid-credential':
          errorMsg = 'Email ou mot de passe incorrect.';
          break;
        case 'auth/too-many-requests':
          errorMsg = 'Trop de tentatives. Réessayez plus tard.';
          break;
        case 'auth/network-request-failed':
          errorMsg = 'Erreur réseau. Vérifiez votre connexion.';
          break;
        default:
          errorMsg = error.message || 'Erreur lors de la connexion.';
      }

      showMessage(errorMsg, 'error');

      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }
  });

  // ===== VÉRIFIER SI DÉJÀ CONNECTÉ =====
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Déjà connecté, rediriger vers l'accueil
      window.location.href = 'index.html';
    }
  });

  console.log("✅ Page de connexion N.I.F chargée !");
</script>

</body>
</html>
