<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A1128">
  <meta name="description" content="N.I.F - Créer votre compte">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #D4AF37;
      --primary-dark: #AA8417;
      --primary-light: #F3E5AB;
      --bg-dark: #0A1128;
      --bg-surface: #111A36;
      --text-light: #FFFFFF;
      --text-dim: #94A3B8;
      --card-bg: rgba(17, 26, 54, 0.8);
      --card-border: rgba(212, 175, 55, 0.2);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --glass-bg: rgba(212, 175, 55, 0.03);
      --glass-border: rgba(212, 175, 55, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse 60% 50% at 15% 15%, rgba(212, 175, 55, 0.08) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 85% 85%, rgba(16, 185, 129, 0.04) 0%, transparent 60%),
                  linear-gradient(180deg, #0A1128 0%, #070C1E 100%);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 17, 40, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-decoration: none;
    }

    .logo-text span {
      color: var(--primary);
    }

    .login-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 30px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .login-link:active {
      transform: scale(0.97);
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      width: 100%;
      flex: 1;
    }

    /* ===== CARD ===== */
    .register-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px 24px;
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== HEADER PAGE ===== */
    .register-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .register-title {
      font-size: 26px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }

    .register-title span {
      color: var(--primary);
      font-style: italic;
    }

    .register-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* ===== MESSAGE ===== */
    .message-banner {
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      animation: fadeInUp 0.3s ease;
    }

    .message-banner.hidden {
      display: none;
    }

    .message-banner.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
    }

    .message-banner.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #A7F3D0;
    }

    .message-banner.warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #FDE68A;
    }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-dim);
      font-size: 13px;
      z-index: 2;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: rgba(10, 17, 40, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      color: var(--text-light);
      font-size: 14px;
      transition: var(--transition);
      outline: none;
    }

    .input-wrapper input:focus {
      border-color: var(--primary);
      background: rgba(10, 17, 40, 0.95);
    }

    .input-wrapper input::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }

    .input-wrapper .input-error {
      border-color: var(--danger);
    }

    .row-2cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ===== TOGGLE PASSWORD ===== */
    .toggle-password {
      position: absolute;
      right: 14px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      z-index: 2;
      transition: var(--transition);
    }

    .toggle-password:hover {
      color: var(--primary);
    }

    /* ===== PAYS SELECTOR (MODAL) ===== */
    .country-selector {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 12px 42px;
      background: rgba(10, 17, 40, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    .country-selector:active {
      transform: scale(0.98);
    }

    .country-selector:focus-within {
      border-color: var(--primary);
      background: rgba(10, 17, 40, 0.95);
    }

    .country-selector .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-dim);
      font-size: 13px;
      z-index: 2;
      pointer-events: none;
    }

    .country-selector-display {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .country-selector-display .flag {
      font-size: 22px;
    }

    .country-selector-display .name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
    }

    .country-selector .arrow {
      color: var(--text-dim);
      font-size: 12px;
      transition: var(--transition);
    }

    .country-selector:focus-within .arrow {
      color: var(--primary);
    }

    /* ===== PHONE ===== */
    .phone-wrapper {
      display: flex;
      align-items: center;
      background: rgba(10, 17, 40, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      transition: var(--transition);
      overflow: hidden;
    }

    .phone-wrapper:focus-within {
      border-color: var(--primary);
      background: rgba(10, 17, 40, 0.95);
    }

    .phone-indicatif {
      padding: 12px 0 12px 14px;
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
      min-width: 55px;
      border-right: 1px solid rgba(212, 175, 55, 0.15);
      background: transparent;
      white-space: nowrap;
      text-align: center;
    }

    .phone-wrapper input {
      flex: 1;
      padding: 12px 14px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 14px;
      outline: none;
      min-width: 0;
    }

    .phone-wrapper input::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* ===== CHECKBOX ===== */
    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 4px 0 6px;
      padding: 4px 0;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      margin-top: 1px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .checkbox-group label {
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      line-height: 1.4;
      text-transform: none;
      letter-spacing: 0;
    }

    .checkbox-group label a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .checkbox-group label a:hover {
      text-decoration: underline;
    }

    .checkbox-group .checkbox-error {
      color: var(--danger);
    }

    /* ===== SUBMIT ===== */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 14px;
      color: #0A1128;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: #0A1128;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .submit-btn.loading .btn-spinner {
      display: inline-block;
    }

    .submit-btn.loading .btn-text {
      display: none;
    }

    .submit-btn.loading .btn-icon {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== FOOTER ===== */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .login-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* ===== COUNTRY MODAL ===== */
    .country-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(3, 3, 5, 0.96);
      backdrop-filter: blur(16px);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .country-modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .country-modal {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 28px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow: hidden;
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .country-modal-overlay.show .country-modal {
      transform: scale(1);
    }

    .country-modal-header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .country-modal-header h3 {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }

    .country-modal-header h3 span {
      color: var(--primary);
      font-style: italic;
    }

    .country-modal-close {
      width: 36px;
      height: 36px;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-dim);
    }

    .country-modal-close:active {
      background: rgba(212, 175, 55, 0.2);
      transform: scale(0.95);
    }

    .country-modal-search {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .country-modal-search input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(10, 17, 40, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 14px;
      color: var(--text-light);
      font-size: 13px;
      outline: none;
    }

    .country-modal-search input:focus {
      border-color: var(--primary);
    }

    .country-modal-search input::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }

    .country-modal-list {
      padding: 8px 8px 16px;
      max-height: 400px;
      overflow-y: auto;
    }

    .country-modal-list::-webkit-scrollbar {
      width: 3px;
    }

    .country-modal-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    .country-modal-list::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    .country-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 2px;
    }

    .country-option:active {
      background: rgba(212, 175, 55, 0.1);
      transform: scale(0.98);
    }

    .country-option.selected {
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid rgba(212, 175, 55, 0.25);
    }

    .country-option-flag {
      font-size: 24px;
    }

    .country-option-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
    }

    .country-option-code {
      margin-left: auto;
      font-size: 12px;
      color: var(--primary-light);
      font-family: monospace;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .register-card {
        padding: 24px 18px;
      }

      .row-2cols {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .register-title {
        font-size: 22px;
      }

      .country-modal {
        max-width: 100%;
        margin: 10px;
        border-radius: 20px;
      }
    }

    /* ===== FOOTER SITE ===== */
    .site-footer {
      text-align: center;
      padding: 20px 16px 10px;
      border-top: 1px solid rgba(212, 175, 55, 0.06);
      margin-top: 10px;
    }

    .site-footer p {
      color: var(--text-dim);
      font-size: 11px;
    }
    
    /* ============================================================
   RESPONSIVE - À AJOUTER À LA FIN DU FICHIER
   ============================================================ */

/* ===== TABLETTE (>= 768px) ===== */
@media (min-width: 768px) {
  .container {
    max-width: 700px;
    padding: 30px 24px 60px;
  }

  .register-card {
    padding: 40px 36px;
    border-radius: 32px;
  }

  .register-title {
    font-size: 30px;
  }

  .row-2cols {
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .row-2cols .form-group {
    margin-bottom: 0;
  }

  .country-modal {
    max-width: 420px;
  }

  .header {
    padding: 16px 5%;
  }

  .logo-text {
    font-size: 26px;
  }

  .login-link {
    font-size: 14px;
    padding: 10px 20px;
  }

  .submit-btn {
    padding: 16px;
    font-size: 16px;
  }
}

/* ===== ORDINATEUR (>= 1024px) ===== */
@media (min-width: 1024px) {
  .container {
    max-width: 900px;
    padding: 40px 32px 80px;
  }

  .register-card {
    padding: 48px 44px;
    border-radius: 36px;
  }

  .register-title {
    font-size: 34px;
  }

  .register-subtitle {
    font-size: 15px;
  }

  .row-2cols {
    gap: 20px;
  }

  .form-group label {
    font-size: 12px;
  }

  .input-wrapper input,
  .country-selector,
  .phone-wrapper {
    padding: 14px 16px 14px 46px;
    font-size: 15px;
    border-radius: 14px;
  }

  .input-wrapper .input-icon {
    left: 16px;
    font-size: 15px;
  }

  .phone-indicatif {
    padding: 14px 0 14px 16px;
    font-size: 15px;
    min-width: 60px;
  }

  .phone-wrapper input {
    padding: 14px 16px;
    font-size: 15px;
  }

  .country-selector-display .flag {
    font-size: 26px;
  }

  .country-selector-display .name {
    font-size: 15px;
  }

  .checkbox-group label {
    font-size: 13px;
  }

  .submit-btn {
    padding: 18px;
    font-size: 17px;
    border-radius: 16px;
    margin-top: 12px;
  }

  .login-footer {
    font-size: 14px;
    margin-top: 28px;
  }

  .country-modal {
    max-width: 460px;
    border-radius: 32px;
  }

  .country-modal-header h3 {
    font-size: 20px;
  }

  .country-option {
    padding: 14px 18px;
  }

  .country-option-name {
    font-size: 15px;
  }

  .site-footer p {
    font-size: 12px;
  }
}

/* ===== GRAND ÉCRAN (>= 1280px) ===== */
@media (min-width: 1280px) {
  .container {
    max-width: 1100px;
    padding: 50px 40px 100px;
  }

  .register-card {
    padding: 56px 52px;
    border-radius: 40px;
  }

  .register-title {
    font-size: 38px;
  }

  .row-2cols {
    gap: 24px;
  }

  .input-wrapper input,
  .country-selector,
  .phone-wrapper {
    padding: 16px 18px 16px 50px;
    font-size: 16px;
  }

  .input-wrapper .input-icon {
    left: 18px;
    font-size: 16px;
  }
}

/* ===== PETIT TÉLÉPHONE (< 400px) ===== */
@media (max-width: 399px) {
  .register-card {
    padding: 20px 14px;
    border-radius: 20px;
  }

  .register-title {
    font-size: 20px;
  }

  .register-subtitle {
    font-size: 12px;
  }

  .input-wrapper input,
  .country-selector,
  .phone-wrapper {
    padding: 10px 12px 10px 36px;
    font-size: 13px;
  }

  .input-wrapper .input-icon {
    left: 10px;
    font-size: 12px;
  }

  .phone-indicatif {
    padding: 10px 0 10px 10px;
    font-size: 13px;
    min-width: 48px;
  }

  .phone-wrapper input {
    padding: 10px 12px;
    font-size: 13px;
  }

  .country-selector-display .flag {
    font-size: 18px;
  }

  .country-selector-display .name {
    font-size: 13px;
  }

  .submit-btn {
    padding: 12px;
    font-size: 14px;
  }

  .login-footer {
    font-size: 12px;
  }

  .checkbox-group label {
    font-size: 11px;
  }

  .checkbox-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    min-width: 16px;
  }
}login.html
  </style>
</head>
<body>

<div class="gradient-bg"></div>

<!-- HEADER -->
<header class="header">
  <a href="index.html" class="logo-text">N.I.<span>F</span></a>
  <a href="login.html" class="login-link"><i class="fas fa-sign-in-alt"></i> Connexion</a>
</header>

<!-- MAIN -->
<main class="container">
  <div class="register-card">

    <!-- HEADER -->
    <div class="register-header">
      <h1 class="register-title">Créer un <span>Compte</span></h1>
      <p class="register-subtitle">Rejoignez la plateforme N.I.F</p>
    </div>

    <!-- MESSAGE -->
    <div id="messageBanner" class="message-banner hidden">
      <i id="messageIcon" class="fas fa-info-circle"></i>
      <span id="messageText"></span>
    </div>

    <!-- FORM -->
    <form id="registerForm" novalidate>

      <!-- Nom + Prénom -->
      <div class="row-2cols">
        <div class="form-group">
          <label>Nom</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="nom" placeholder="Votre nom" autocomplete="family-name" required>
          </div>
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="prenom" placeholder="Votre prénom" autocomplete="given-name" required>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="email" placeholder="exemple@email.com" autocomplete="email" required>
        </div>
      </div>

      <!-- Pays -->
      <div class="form-group">
        <label>Pays</label>
        <div class="country-selector" id="countrySelector">
          <i class="fas fa-globe-africa input-icon"></i>
          <div class="country-selector-display">
            <span class="flag" id="selectedCountryFlag">🇳🇪</span>
            <span class="name" id="selectedCountryName">Niger</span>
          </div>
          <i class="fas fa-chevron-down arrow"></i>
        </div>
        <input type="hidden" id="pays" value="Niger">
        <input type="hidden" id="indicatif" value="+227">
      </div>

      <!-- Téléphone -->
      <div class="form-group">
        <label>Téléphone</label>
        <div class="phone-wrapper">
          <span class="phone-indicatif" id="indicatifDisplay">+227</span>
          <input type="tel" id="phone" placeholder="90 12 34 56" autocomplete="tel" required maxlength="10">
        </div>
        <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">
          <i class="fas fa-info-circle"></i> 8 chiffres (ex: 90 12 34 56)
        </div>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="8 caractères minimum" autocomplete="new-password" required>
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>
        <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">
          <i class="fas fa-info-circle"></i> Minimum 8 caractères
        </div>
      </div>

      <!-- Confirmer -->
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" autocomplete="new-password" required>
          <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
        </div>
      </div>

      <!-- Conditions -->
      <div class="form-group">
        <div class="checkbox-group" id="checkboxGroup">
          <input type="checkbox" id="acceptConditions">
          <label for="acceptConditions" id="conditionsLabel">
            J'accepte les <a href="conditions.html" target="_blank">conditions d'utilisation</a>
          </label>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-icon"><i class="fas fa-user-plus"></i></span>
        <span class="btn-text">Créer mon compte</span>
        <span class="btn-spinner"></span>
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      Déjà membre ? <a href="login.html">Connectez-vous</a>
    </div>

  </div>
</main>

<footer class="site-footer">
  <p>&copy; 2026 N.I.F - Niger Investment & Finance</p>
</footer>

<!-- ===== COUNTRY MODAL ===== -->
<div class="country-modal-overlay" id="countryModal">
  <div class="country-modal">
    <div class="country-modal-header">
      <h3>Sélectionnez votre <span>pays</span></h3>
      <button class="country-modal-close" id="closeCountryModalBtn">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="country-modal-search">
      <input type="text" id="countrySearch" placeholder="🔍 Rechercher un pays..." autocomplete="off">
    </div>
    <div class="country-modal-list" id="countryList"></div>
  </div>
</div>

<!-- ===== IMPORTS ===== -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyDEjj2oAg7ZL8HvdkSWliShxydgq_BPxzs",
    authDomain: "brickshare-d35b3.firebaseapp.com",
    projectId: "brickshare-d35b3",
    storageBucket: "brickshare-d35b3.firebasestorage.app",
    messagingSenderId: "613227362818",
    appId: "1:613227362818:web:c4de1ad3372c16d8d3051b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  setPersistence(auth, browserLocalPersistence);

  // ===== PAYS =====
  const countries = [
    { name: "Niger", flag: "🇳🇪", code: "+227" },
    { name: "Mali", flag: "🇲🇱", code: "+223" },
    { name: "Bénin", flag: "🇧🇯", code: "+229" },
    { name: "Burkina Faso", flag: "🇧🇫", code: "+226" },
    { name: "Sénégal", flag: "🇸🇳", code: "+221" },
    { name: "Togo", flag: "🇹🇬", code: "+228" },
    { name: "Nigeria", flag: "🇳🇬", code: "+234" }
  ];

  let selectedCountry = "Niger";
  let selectedFlag = "🇳🇪";
  let selectedCode = "+227";

  // ===== DOM =====
  const form = document.getElementById('registerForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageBanner = document.getElementById('messageBanner');
  const messageIcon = document.getElementById('messageIcon');
  const messageText = document.getElementById('messageText');

  const nomInput = document.getElementById('nom');
  const prenomInput = document.getElementById('prenom');
  const emailInput = document.getElementById('email');
  const phoneInput = document.getElementById('phone');
  const passwordInput = document.getElementById('password');
  const confirmPasswordInput = document.getElementById('confirmPassword');
  const acceptConditions = document.getElementById('acceptConditions');

  const countrySelector = document.getElementById('countrySelector');
  const selectedCountryFlag = document.getElementById('selectedCountryFlag');
  const selectedCountryName = document.getElementById('selectedCountryName');
  const paysInput = document.getElementById('pays');
  const indicatifInput = document.getElementById('indicatif');
  const indicatifDisplay = document.getElementById('indicatifDisplay');

  const togglePassword = document.getElementById('togglePassword');
  const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

  const countryModal = document.getElementById('countryModal');
  const closeCountryModalBtn = document.getElementById('closeCountryModalBtn');
  const countrySearch = document.getElementById('countrySearch');
  const countryList = document.getElementById('countryList');

  // ===== TOGGLE PASSWORD =====
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.classList.toggle('fa-eye');
    togglePassword.classList.toggle('fa-eye-slash');
  });

  toggleConfirmPassword.addEventListener('click', () => {
    const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
    confirmPasswordInput.type = type;
    toggleConfirmPassword.classList.toggle('fa-eye');
    toggleConfirmPassword.classList.toggle('fa-eye-slash');
  });

  // ===== COUNTRY MODAL =====
  function openCountryModal() {
    countryModal.classList.add('show');
    countrySearch.value = '';
    renderCountryList();
    setTimeout(() => countrySearch.focus(), 200);
  }

  function closeCountryModal() {
    countryModal.classList.remove('show');
  }

  function selectCountry(name, flag, code) {
    selectedCountry = name;
    selectedFlag = flag;
    selectedCode = code;

    selectedCountryFlag.textContent = flag;
    selectedCountryName.textContent = name;
    paysInput.value = name;
    indicatifInput.value = code;
    indicatifDisplay.textContent = code;

    closeCountryModal();
  }

  function renderCountryList(filter = "") {
    const filtered = countries.filter(c =>
      c.name.toLowerCase().includes(filter.toLowerCase()) ||
      c.code.includes(filter)
    );

    countryList.innerHTML = filtered.map(c => `
      <div class="country-option ${c.name === selectedCountry ? 'selected' : ''}"
           data-name="${c.name}" data-flag="${c.flag}" data-code="${c.code}">
        <span class="country-option-flag">${c.flag}</span>
        <span class="country-option-name">${c.name}</span>
        <span class="country-option-code">${c.code}</span>
      </div>
    `).join('');

    document.querySelectorAll('.country-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const name = opt.dataset.name;
        const flag = opt.dataset.flag;
        const code = opt.dataset.code;
        selectCountry(name, flag, code);
      });
    });
  }

  countrySelector.addEventListener('click', openCountryModal);
  closeCountryModalBtn.addEventListener('click', closeCountryModal);
  countryModal.addEventListener('click', (e) => {
    if (e.target === countryModal) closeCountryModal();
  });

  countrySearch.addEventListener('input', (e) => {
    renderCountryList(e.target.value);
  });

  // ===== MESSAGE =====
  function showMessage(text, type = 'error') {
    messageBanner.className = `message-banner ${type}`;
    messageIcon.className = type === 'error' ? 'fas fa-exclamation-circle' :
                           (type === 'success' ? 'fas fa-check-circle' : 'fas fa-info-circle');
    messageText.textContent = text;
    messageBanner.classList.remove('hidden');

    if (type === 'success') {
      setTimeout(() => messageBanner.classList.add('hidden'), 5000);
    }
  }

  function hideMessage() {
    messageBanner.classList.add('hidden');
  }

  // ===== VALIDATION =====
  function validateForm() {
    const nom = nomInput.value.trim();
    const prenom = prenomInput.value.trim();
    const email = emailInput.value.trim();
    const phone = phoneInput.value.trim().replace(/\s/g, '');
    const password = passwordInput.value;
    const confirm = confirmPasswordInput.value;

    if (!nom) { showMessage('Veuillez saisir votre nom.', 'error'); return false; }
    if (!prenom) { showMessage('Veuillez saisir votre prénom.', 'error'); return false; }
    if (!email) { showMessage('Veuillez saisir votre email.', 'error'); return false; }
    if (!email.includes('@') || !email.includes('.')) {
      showMessage('Veuillez saisir un email valide.', 'error');
      return false;
    }
    if (!phone || phone.length < 8) {
      showMessage(`Le numéro doit contenir 8 chiffres.`, 'error');
      return false;
    }
    if (phone.length > 8) {
      showMessage(`Le numéro ne doit pas dépasser 8 chiffres.`, 'error');
      return false;
    }
    if (!password || password.length < 8) {
      showMessage('Le mot de passe doit contenir au moins 8 caractères.', 'error');
      return false;
    }
    if (password !== confirm) {
      showMessage('Les mots de passe ne correspondent pas.', 'error');
      return false;
    }
    if (!acceptConditions.checked) {
      showMessage('Vous devez accepter les conditions d\'utilisation.', 'warning');
      return false;
    }

    return true;
  }

  // ===== SUBMIT =====
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMessage();

    if (!validateForm()) return;

    const nom = nomInput.value.trim();
    const prenom = prenomInput.value.trim();
    const email = emailInput.value.trim();
    const phone = phoneInput.value.trim().replace(/\s/g, '');
    const password = passwordInput.value;
    const fullPhone = selectedCode + phone;

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    try {
      // 1. Création Auth
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      const now = new Date().toISOString();

      // 2. Création du document utilisateur
      const userData = {
        uid: user.uid,
        nom: nom,
        prenom: prenom,
        fullName: `${prenom} ${nom}`,
        email: email,
        phone: fullPhone,
        pays: selectedCountry,
        paysCode: selectedCode,
        balance: 0,
        totalDepots: 0,
        totalRetraits: 0,
        totalAchats: 0,
        totalVentes: 0,
        totalRevenus: 0,
        formationsAchetees: [],
        status: "active",
        role: "user",
        createdAt: now,
        registrationDate: now,
        lastLogin: now,
        notificationPreferences: {
          ventes: true,
          achats: true,
          promotions: true
        }
      };

      await setDoc(doc(db, "users", user.uid), userData);

      // 3. Stockage local
      localStorage.setItem('NIF_current_user', user.uid);
      localStorage.setItem('NIF_user_name', userData.fullName);

      showMessage('✅ Compte créé avec succès !', 'success');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);

    } catch (error) {
      console.error("❌ Erreur inscription:", error);

      let errorMsg = 'Erreur lors de la création du compte.';
      if (error.code === 'auth/email-already-in-use') {
        errorMsg = 'Cet email est déjà utilisé.';
      } else if (error.code === 'auth/invalid-email') {
        errorMsg = 'Email invalide.';
      } else if (error.code === 'auth/weak-password') {
        errorMsg = 'Mot de passe trop faible (8 caractères minimum).';
      } else if (error.code === 'auth/network-request-failed') {
        errorMsg = 'Erreur réseau. Vérifiez votre connexion.';
      }

      showMessage(errorMsg, 'error');

      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }
  });

  // ===== CHARGEMENT RAPIDE DU NOM DEPUIS LOCALSTORAGE =====
  const savedName = localStorage.getItem('NIF_user_name');
  if (savedName) {
    // Déjà connecté, rediriger
    window.location.href = 'index.html';
  }

  console.log("✅ Page d'inscription N.I.F chargée !");
</script>

</body>
</html>
