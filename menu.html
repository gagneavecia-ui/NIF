<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A1128">
  <meta name="description" content="N.I.F - Menu de navigation">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #D4AF37;
      --primary-dark: #AA8417;
      --primary-light: #F3E5AB;
      --bg-dark: #0A1128;
      --bg-surface: #111A36;
      --text-light: #FFFFFF;
      --text-dim: #94A3B8;
      --card-bg: rgba(17, 26, 54, 0.65);
      --card-border: rgba(212, 175, 55, 0.12);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --glass-bg: rgba(212, 175, 55, 0.03);
      --glass-border: rgba(212, 175, 55, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 60% 50% at 15% 15%, rgba(212, 175, 55, 0.06) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 85% 85%, rgba(16, 185, 129, 0.03) 0%, transparent 60%),
                  linear-gradient(180deg, #0A1128 0%, #070C1E 100%);
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 17, 40, 0.95);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-decoration: none;
    }

    .logo-text span {
      color: var(--primary);
    }

    .close-btn {
      width: 40px;
      height: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
    }

    .close-btn:active {
      transform: scale(0.95);
      background: rgba(212, 175, 55, 0.1);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* CONTAINER */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* SECTION UTILISATEUR */
    .user-section {
      text-align: center;
      padding: 20px 0 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 24px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .user-avatar-large {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 32px;
      font-weight: 700;
      color: #0A1128;
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
    }

    .user-name-large {
      font-size: 20px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      margin-bottom: 4px;
    }

    .user-email-large {
      font-size: 13px;
      color: var(--text-dim);
    }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 30px;
      padding: 4px 14px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--primary-light);
    }

    .user-badge i {
      font-size: 10px;
    }

    /* GRILLE MENU */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .menu-item-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 18px 12px;
      text-align: center;
      text-decoration: none;
      color: var(--text-light);
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: pointer;
    }

    .menu-item-card:active {
      transform: scale(0.94);
      background: rgba(212, 175, 55, 0.08);
      border-color: var(--primary);
    }

    .menu-item-card .menu-icon {
      font-size: 28px;
      color: var(--primary);
      margin-bottom: 10px;
      display: block;
    }

    .menu-item-card .menu-label {
      font-size: 11px;
      font-weight: 500;
      display: block;
    }

    .menu-item-card .menu-badge {
      display: inline-block;
      background: var(--danger);
      color: white;
      font-size: 8px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .menu-item-card .menu-badge.success {
      background: var(--success);
    }

    /* SECTION LIENS SECONDAIRES */
    .secondary-links {
      display: flex;
      flex-direction: column;
      gap: 2px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 20px;
      margin-bottom: 20px;
    }

    .secondary-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text-light);
      transition: all 0.2s;
    }

    .secondary-link:active {
      background: rgba(212, 175, 55, 0.08);
      transform: translateX(4px);
    }

    .secondary-link i {
      width: 22px;
      font-size: 16px;
      color: var(--primary);
    }

    .secondary-link span {
      font-size: 14px;
      font-weight: 500;
    }

    .secondary-link .link-arrow {
      margin-left: auto;
      color: var(--text-dim);
      font-size: 12px;
    }

    .secondary-link:active .link-arrow {
      color: var(--primary);
      transform: translateX(2px);
    }

    /* BOUTON DÉCONNEXION */
    .logout-btn {
      width: 100%;
      padding: 16px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 14px;
      color: #F87171;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .logout-btn:active {
      transform: scale(0.97);
      background: rgba(239, 68, 68, 0.15);
    }

    .logout-btn i {
      font-size: 16px;
    }

    /* VERSION ADMIN */
    .admin-section {
      margin-top: 16px;
      border-top: 1px solid rgba(212, 175, 55, 0.1);
      padding-top: 16px;
      display: none;
    }

    .admin-section.show {
      display: block;
    }

    .admin-label {
      font-size: 10px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-label i {
      font-size: 12px;
    }

    .admin-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(212, 175, 55, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.1);
      border-radius: 14px;
      text-decoration: none;
      color: var(--primary-light);
      transition: all 0.2s;
    }

    .admin-link:active {
      background: rgba(212, 175, 55, 0.12);
      transform: translateX(4px);
    }

    .admin-link i {
      width: 22px;
      font-size: 16px;
      color: var(--primary);
    }

    .admin-link span {
      font-size: 14px;
      font-weight: 500;
    }

    .admin-link .link-arrow {
      margin-left: auto;
      color: var(--primary);
      font-size: 12px;
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .menu-grid {
        gap: 12px;
      }
      
      .menu-item-card {
        padding: 14px 10px;
      }
      
      .menu-item-card .menu-icon {
        font-size: 24px;
      }
      
      .menu-item-card .menu-label {
        font-size: 10px;
      }
      
      .user-avatar-large {
        width: 64px;
        height: 64px;
        font-size: 26px;
      }
      
      .user-name-large {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

<div class="gradient-bg"></div>

<header class="header">
  <a href="index.html" class="logo-text">N.I.<span>F</span></a>
  <a href="index.html" class="close-btn"><i class="fas fa-times"></i></a>
</header>

<main class="container">
  
  <!-- SECTION UTILISATEUR -->
  <div class="user-section">
    <div class="user-avatar-large" id="menuAvatar">M</div>
    <div class="user-name-large" id="menuUserName">Chargement...</div>
    <div class="user-email-large" id="menuUserEmail">email@exemple.com</div>
    <div class="user-badge">
      <i class="fas fa-crown"></i> Membre N.I.F
    </div>
  </div>

  <!-- GRILLE MENU PRINCIPAL -->
  <div class="menu-grid">
    <a href="index.html" class="menu-item-card">
      <span class="menu-icon"><i class="fas fa-home"></i></span>
      <span class="menu-label">Accueil</span>
    </a>
    <a href="investissement.html" class="menu-item-card">
      <span class="menu-icon"><i class="fas fa-chart-line"></i></span>
      <span class="menu-label">Investir</span>
      <span class="menu-badge success">Actif</span>
    </a>
    <a href="formations.html" class="menu-item-card">
      <span class="menu-icon"><i class="fas fa-graduation-cap"></i></span>
      <span class="menu-label">Formations</span>
    </a>
    <a href="parrainage.html" class="menu-item-card">
      <span class="menu-icon"><i class="fas fa-users"></i></span>
      <span class="menu-label">Parrainage</span>
      <span class="menu-badge">500F</span>
    </a>
    <a href="profil.html" class="menu-item-card">
      <span class="menu-icon"><i class="fas fa-user-circle"></i></span>
      <span class="menu-label">Profil</span>
    </a>
    <a href="historique.html" class="menu-item-card">
      <span class="menu-icon"><i class="fas fa-history"></i></span>
      <span class="menu-label">Historique</span>
    </a>
  </div>

  <!-- LIENS SECONDAIRES -->
  <div class="secondary-links">
    <a href="nex.html" class="secondary-link">
      <i class="fas fa-bolt-lightning"></i>
      <span>Rendement Express</span>
      <span class="link-arrow"><i class="fas fa-chevron-right"></i></span>
    </a>
    <a href="informations.html" class="secondary-link">
      <i class="fas fa-university"></i>
      <span>Note Institutionnelle</span>
      <span class="link-arrow"><i class="fas fa-chevron-right"></i></span>
    </a>
    <a href="avis.html" class="secondary-link">
      <i class="fas fa-star"></i>
      <span>Témoignages</span>
      <span class="link-arrow"><i class="fas fa-chevron-right"></i></span>
    </a>
    <a href="support.html" class="secondary-link">
      <i class="fas fa-headset"></i>
      <span>Support</span>
      <span class="link-arrow"><i class="fas fa-chevron-right"></i></span>
    </a>
  </div>

  <!-- SECTION ADMIN (cachée par défaut) -->
  <div class="admin-section" id="adminSection">
    <div class="admin-label">
      <i class="fas fa-lock"></i> Administration
    </div>
    <a href="admin.html" class="admin-link">
      <i class="fas fa-shield-alt"></i>
      <span>Panneau d'administration</span>
      <span class="link-arrow"><i class="fas fa-chevron-right"></i></span>
    </a>
  </div>

  <!-- BOUTON DÉCONNEXION -->
  <button class="logout-btn" id="logoutBtn">
    <i class="fas fa-sign-out-alt"></i> Se déconnecter
  </button>

</main>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAVlK5ivp2dCWyr22gkeGSLbRdwTIVMrEE",
    authDomain: "earnzone-9e82e.firebaseapp.com",
    projectId: "earnzone-9e82e",
    storageBucket: "earnzone-9e82e.firebasestorage.app",
    messagingSenderId: "1076831479440",
    appId: "1:1076831479440:web:8da3b161e9683dd98e1a15"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const ADMIN_EMAIL = "gagneavecia@gmail.com";

  // DOM Elements
  const menuAvatar = document.getElementById('menuAvatar');
  const menuUserName = document.getElementById('menuUserName');
  const menuUserEmail = document.getElementById('menuUserEmail');
  const logoutBtn = document.getElementById('logoutBtn');
  const adminSection = document.getElementById('adminSection');

  // Charger les données utilisateur
  async function loadUserData(uid) {
    try {
      const userRef = doc(db, "users", uid);
      const userDoc = await getDoc(userRef);
      
      if (userDoc.exists()) {
        const userData = userDoc.data();
        const displayName = userData.fullName || userData.prenom || "Membre";
        const email = userData.email || "email@exemple.com";
        
        menuAvatar.textContent = displayName.charAt(0).toUpperCase();
        menuUserName.textContent = displayName;
        menuUserEmail.textContent = email;
        
        // Vérifier si admin
        if (email === ADMIN_EMAIL) {
          adminSection.classList.add('show');
        }
      }
    } catch (error) {
      console.error("Erreur chargement:", error);
    }
  }

  // Déconnexion
  logoutBtn.addEventListener('click', async () => {
    try {
      await signOut(auth);
      localStorage.removeItem('NIF_current_user');
      window.location.href = 'login.html';
    } catch (error) {
      window.location.href = 'login.html';
    }
  });

  // Auth state
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loadUserData(user.uid);
    } else {
      const savedUid = localStorage.getItem('NIF_current_user');
      if (savedUid) {
        setTimeout(async () => {
          if (!auth.currentUser) {
            window.location.href = 'login.html';
          } else {
            loadUserData(auth.currentUser.uid);
          }
        }, 1000);
      } else {
        window.location.href = 'login.html';
      }
    }
  });

  // PWA Installation
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });
</script>

</body>
</html>
